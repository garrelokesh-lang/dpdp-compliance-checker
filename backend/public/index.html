<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DPDP Compliance Checker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div class="container">
    <h1>DPDP Act 2023 Compliance Checker</h1>
    <p class="subtitle">
      Scan any website for DPDP compliance indicators
    </p>

    <!-- Input Section -->
    <div class="input-section">
      <input
        type="text"
        id="url"
        placeholder="https://example.com"
      />
      <button onclick="loadDashboard()">Dashboard</button>
      <button onclick="scanWebsite()">Scan Website</button>
      <button onclick="loadHistory()">View Scan History</button>
    </div>
    
    <div class="input-section">
      <input type="text" id="url1" placeholder="First Website">
      <input type="text" id="url2" placeholder="Second Website">
      <button onclick="compareWebsites()">Compare</button>
    </div>

    <!-- Dynamic Result Section -->
    <div id="result"></div>

  </div>

  <script src="/script.js"></script>
</body>
</html>
